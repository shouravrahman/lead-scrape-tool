services:
  - type: web
    name: lead-intelligence-system
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -c 'from lead_engine.db.models import init_db; init_db()' && streamlit run lead_engine/ui/app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: AUTO_SYNC_TO_SHEETS
        value: "true"
      # You will need to add these secret keys manually in the Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SERPER_API_KEYS
        sync: false
      - key: FIRECRAWL_API_KEYS
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_FILE
        value: "credentials.json"
    disk:
      name: lead-db
      mountPath: /data
      sizeGB: 1
